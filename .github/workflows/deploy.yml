name: Deploy to Coolify

# Auto-deploys this app to Coolify on every push to main. Use this INSTEAD of
# Coolify's built-in git-push webhook: that webhook is fire-once — a transient
# 502 (Coolify briefly unreachable while a build is running) silently drops the
# deploy with no retry. This workflow calls Coolify's deploy API with retries +
# backoff and turns a red run (with email) when it can't reach Coolify at all.
#
# One-time setup (see references/coolify-api.md, section 8):
#   1. Coolify: turn OFF "Auto Deploy" for this app (this workflow replaces it).
#   2. Delete the Coolify-managed webhook from the GitHub repo so pushes don't
#      double-deploy:  gh api --method DELETE repos/<owner>/<repo>/hooks/<id>
#      (find <id> with:  gh api repos/<owner>/<repo>/hooks --jq '.[].id')
#   3. Create a Coolify API token: Coolify -> Keys & Tokens -> API Tokens (needs
#      deploy permission).
#   4. Add repo secrets (Settings -> Secrets and variables -> Actions):
#        COOLIFY_API_TOKEN  - the token from step 3
#        COOLIFY_APP_UUID   - the APPLICATION uuid (in the Coolify app URL:
#                             /project/.../application/<uuid>), NOT the server uuid
#   5. Set COOLIFY_URL below to your Coolify base URL (stable per instance, so
#      every project on the same VPS uses the same value).

env:
  COOLIFY_URL: https://coolify.zeeshanai.cloud # <-- set once per Coolify instance

on:
  push:
    branches: [main]
  workflow_dispatch: {} # allow manual re-trigger from the Actions tab

concurrency:
  group: deploy-coolify
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify deploy (with retries)
        env:
          COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}
          COOLIFY_APP_UUID: ${{ secrets.COOLIFY_APP_UUID }}
        run: |
          set -u
          for i in 1 2 3 4 5; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 30 \
              "${COOLIFY_URL}/api/v1/deploy?uuid=${COOLIFY_APP_UUID}&force=false" \
              -H "Authorization: Bearer ${COOLIFY_API_TOKEN}" || echo "000")
            echo "Attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then
              echo "Deploy queued successfully."
              exit 0
            fi
            if [ "$i" -lt 5 ]; then
              backoff=$((i * 15)) # 15s, 30s, 45s, 60s
              echo "Retrying in ${backoff}s..."
              sleep "$backoff"
            fi
          done
          echo "::error::All 5 attempts to trigger the Coolify deploy failed."
          exit 1
